<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">Rick / veithly profile banner</title>
  <desc id="desc">A dark terminal-inspired banner for AI-native infrastructure and verifiable Web3 systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070914"/>
      <stop offset="0.45" stop-color="#0A1222"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#A3E635"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#050816"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#23314A" stroke-width="1" opacity="0.45"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid)" opacity="0.55"/>
  <path d="M0 310 C180 260 250 345 430 290 S720 185 900 220 1110 330 1280 255" fill="none" stroke="url(#edge)" stroke-width="2" opacity="0.72"/>
  <path d="M0 82 C130 108 220 52 355 76 S600 170 770 118 1020 20 1280 78" fill="none" stroke="#38BDF8" stroke-width="1.5" opacity="0.45"/>

  <g transform="translate(58 52)">
    <rect width="500" height="256" rx="22" fill="url(#panel)" stroke="#2B3A55" stroke-width="1.5"/>
    <rect x="0" y="0" width="500" height="46" rx="22" fill="#101827"/>
    <rect x="0" y="28" width="500" height="18" fill="#101827"/>
    <circle cx="30" cy="23" r="6" fill="#F87171"/>
    <circle cx="52" cy="23" r="6" fill="#FBBF24"/>
    <circle cx="74" cy="23" r="6" fill="#34D399"/>
    <text x="104" y="29" fill="#94A3B8" font-family="Consolas, Menlo, monospace" font-size="14">operator@agent-lab:~/ship</text>

    <text x="30" y="88" fill="#A3E635" font-family="Consolas, Menlo, monospace" font-size="18">$ verify-run --trace --policy</text>
    <text x="30" y="123" fill="#E5E7EB" font-family="Consolas, Menlo, monospace" font-size="18">proof bundle sealed</text>
    <text x="30" y="154" fill="#38BDF8" font-family="Consolas, Menlo, monospace" font-size="18">mcp bridge online</text>
    <text x="30" y="185" fill="#FDBA74" font-family="Consolas, Menlo, monospace" font-size="18">onchain demo path ready</text>
    <rect x="30" y="210" width="392" height="1" fill="#2B3A55"/>
    <text x="30" y="236" fill="#94A3B8" font-family="Consolas, Menlo, monospace" font-size="14">agent infra / web3 systems / fast product proof</text>
  </g>

  <g transform="translate(608 76)">
    <text x="0" y="0" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" letter-spacing="4">AI + WEB3 SYSTEMS BUILDER</text>
    <text x="0" y="66" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="800">RICK / VEITHLY</text>
    <text x="0" y="108" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">Agent control planes. Verifiable execution. Onchain products.</text>

    <g transform="translate(0 146)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
      <rect x="0" y="0" width="126" height="34" rx="17" fill="#0F172A" stroke="#38BDF8"/>
      <text x="17" y="22" fill="#BAE6FD">AgentProof</text>
      <rect x="142" y="0" width="110" height="34" rx="17" fill="#0F172A" stroke="#A3E635"/>
      <text x="162" y="22" fill="#D9F99D">VibeShell</text>
      <rect x="268" y="0" width="184" height="34" rx="17" fill="#0F172A" stroke="#F97316"/>
      <text x="286" y="22" fill="#FED7AA">Harness Architecture</text>
    </g>

    <g transform="translate(0 194)" font-family="Consolas, Menlo, monospace" font-size="15">
      <text x="0" y="0" fill="#38BDF8">latest lanes</text>
      <text x="0" y="27" fill="#E5E7EB">01 signed traces for agents</text>
      <text x="0" y="52" fill="#E5E7EB">02 AI-native remote ops</text>
      <text x="0" y="77" fill="#E5E7EB">03 Web3 launch and intent tooling</text>
    </g>
  </g>

  <g transform="translate(1120 58)" filter="url(#glow)">
    <path d="M36 0 L105 40 L105 120 L36 160 L-33 120 L-33 40 Z" fill="none" stroke="url(#edge)" stroke-width="2"/>
    <path d="M36 32 L77 56 L77 104 L36 128 L-5 104 L-5 56 Z" fill="none" stroke="#38BDF8" stroke-width="1.5" opacity="0.72"/>
    <text x="36" y="87" fill="#F8FAFC" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">2026</text>
  </g>
</svg>
